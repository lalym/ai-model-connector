kind = "web"
previewPath = "/"
title = "Contact Importer"
version = "1.0.0"
id = "artifacts/contact-importer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20085

[services.development]
run = "pnpm --filter @workspace/contact-importer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/contact-importer", "run", "build" ]
publicDir = "artifacts/contact-importer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20085"
BASE_PATH = "/"
